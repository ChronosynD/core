name: python

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "chronosynd-py/**"
      - "evaluation/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "chronosynd-py/**"
      - "evaluation/**"
      - ".github/workflows/python.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: chronosynd-py
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv sync --extra dev --extra viz
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest
