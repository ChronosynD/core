name: python

on:
  push:
    branches: [main]
    paths:
      - "chronosynd-py/**"
      - "evaluation/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "chronosynd-py/**"
      - "evaluation/**"
      - ".github/workflows/python.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: chronosynd-py
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv sync --extra dev
      - name: Ruff (once deps are pinned)
        run: echo "ruff check placeholder, enable once dev deps are pinned"
      - name: Pytest (once deps are pinned)
        run: echo "pytest placeholder, enable once dev deps are pinned"
