name: parity

# Cross-implementation parity check, fails the build if Python and Rust outputs diverge

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-04-26
      - uses: astral-sh/setup-uv@v7
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chronosynd-rs -> target
      - name: Sync Python deps
        working-directory: chronosynd-py
        run: uv sync --extra dev
      - name: Run parity check
        run: bash scripts/check_parity.sh
